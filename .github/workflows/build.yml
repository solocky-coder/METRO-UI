name: Build DYSEKT

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows Standalone + VST3
    # Pin the stable VS 2022 image. windows-latest now resolves to the VS 2026 preview image.
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Fetch bungee
        shell: pwsh
        run: |
          if (-not (Test-Path "bungee/src")) {
            Remove-Item -Recurse -Force bungee -ErrorAction SilentlyContinue
            git clone --depth 1 --recurse-submodules https://github.com/kupix/bungee.git bungee
          }

      - name: Fetch signalsmith-stretch
        shell: pwsh
        run: |
          if (-not (Test-Path "signalsmith-stretch/signalsmith-stretch.h")) {
            Remove-Item -Recurse -Force signalsmith-stretch -ErrorAction SilentlyContinue
            git clone --depth 1 https://github.com/Signalsmith-Audio/signalsmith-stretch.git signalsmith-stretch
          }

      - name: Fetch signalsmith-linear
        shell: pwsh
        run: |
          if (-not (Test-Path "signalsmith-linear")) {
            Remove-Item -Recurse -Force signalsmith-linear -ErrorAction SilentlyContinue
            git clone --depth 1 https://github.com/Signalsmith-Audio/linear.git signalsmith-linear
          }

      - name: Fetch sfizz
        shell: pwsh
        run: |
          if (-not (Test-Path "sfizz/CMakeLists.txt")) {
            Remove-Item -Recurse -Force sfizz -ErrorAction SilentlyContinue
            git clone --depth 1 --recurse-submodules https://github.com/sfztools/sfizz.git sfizz
          }

      - name: Patch sfizz cxxopts alias collision
        shell: pwsh
        run: |
          $file = "sfizz/cmake/SfizzDeps.cmake"
          $content = Get-Content $file -Raw
          $content = $content -replace `
            'add_library\(sfizz::cxxopts ALIAS (\S+)\)', `
            "if(NOT TARGET sfizz::cxxopts)`n  add_library(sfizz::cxxopts ALIAS `$1)`nendif()"
          Set-Content $file $content
          Write-Host "Patched sfizz::cxxopts alias guard applied."

      - name: Patch sfizz MSVC runtime to MD
        shell: pwsh
        run: |
          $file = "sfizz/cmake/SfizzConfig.cmake"
          $content = Get-Content $file -Raw
          $content = $content -replace `
            'set\(CMAKE_MSVC_RUNTIME_LIBRARY "MultiThreaded\$<\$<CONFIG:Debug>:Debug>"\)\r?\n?', ''
          Set-Content $file $content
          Write-Host "Patched sfizz MSVC runtime: removed hardcoded MT override."

      - name: Install FluidSynth via vcpkg (static)
        shell: pwsh
        run: |
          vcpkg install fluidsynth:x64-windows-static-md
          $vcpkgBin = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static-md\bin"
          if (Test-Path $vcpkgBin) {
            echo "$vcpkgBin" >> $env:GITHUB_PATH
          }
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static-md `
            -DJUCE_BUILD_EXTRAS=OFF `
            -DJUCE_BUILD_EXAMPLES=OFF

      # Build one project/compiler task at a time. JUCE + sfizz exceeds the
      # hosted runner's memory limit when MSBuild and MSVC compile in parallel.
      - name: Build Standalone
        shell: pwsh
        run: cmake --build build --config Release --target DysektStandalone --parallel 1 -- /m:1 /bl:build\standalone.binlog /v:diag

      - name: Build VST3
        shell: pwsh
        run: cmake --build build --config Release --target Dysekt_VST3 --parallel 1 -- /m:1 /bl:build\vst3.binlog /v:diag

      # Always retain MSBuild diagnostics, including when either build fails.
      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DYSEKT-build-diagnostics
          path: build/*.binlog
          if-no-files-found: warn

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/Standalone | Out-Null
          New-Item -ItemType Directory -Force -Path artifacts/VST3 | Out-Null

          # JUCE writes the standalone to DysektStandalone_artefacts/<config>/
          # using PRODUCT_NAME (DYSEKT-SF), not the CMake target name.
          $standaloneExes = @(Get-ChildItem -Recurse -File -Filter "DYSEKT-SF.exe" build/ |
            Where-Object { $_.FullName -match "DysektStandalone_artefacts" })
          if ($standaloneExes.Count -ne 1) {
            Write-Error "Expected exactly one standalone executable; found $($standaloneExes.Count)."
            $standaloneExes | ForEach-Object { Write-Host "  $($_.FullName)" }
            exit 1
          }
          Copy-Item -Force $standaloneExes[0].FullName artifacts/Standalone/

          # VST3 bundle (JUCE outputs a .vst3 folder, not a file).
          # NOTE: matched by extension, not a hardcoded product name — the
          # actual product name is "DYSEKT-SF" (see PluginEditor.cpp /
          # SfzPlayer.cpp), not "DYSEKT". A literal "DYSEKT.vst3" filter here
          # previously matched nothing, so this step silently copied zero
          # files while the PDB loop above (which matches *.pdb generically)
          # still populated the folder — masking the miss entirely, since
          # "if-no-files-found: error" only trips on a fully empty folder.
          $vst3s = Get-ChildItem -Recurse -Directory -Filter "*.vst3" build/
          if ($vst3s.Count -eq 0) {
            Write-Error "NO .vst3 BUNDLE FOUND under build/ — check the VST3 target's product name."
            exit 1
          }
          foreach ($v in $vst3s) {
            $dest = Join-Path "artifacts/VST3" $v.Name
            if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
            Copy-Item -Recurse -Force $v.FullName "artifacts/VST3/"
          }

          # Debug symbols are retained only in diagnostics, never in user downloads.
          Get-ChildItem -Path artifacts -Recurse -File -Filter "*.pdb" |
            Remove-Item -Force

          Write-Host "Collected artifacts:"
          Get-ChildItem artifacts/ -Recurse

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: DYSEKT-Standalone
          path: artifacts/Standalone/
          if-no-files-found: error

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: DYSEKT-VST3
          path: artifacts/VST3/
          if-no-files-found: error
