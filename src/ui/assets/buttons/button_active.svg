<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40">
  <!--
    Metro spec: flat fill, square corners, borders 1px only, no gloss/glow.
    Replaces the old inverted-gradient + rising cyan-glow-wash + glow-edge
    active sprite. The calling code (SliceControlBar::drawViewToggleButtons,
    DualLcdControlFrame::drawTab, Sf2ProgramGrid) already draws its own
    accent-coloured border on top of this sprite for the active state, so
    this sprite only needs to provide a flat, slightly darker base fill —
    no border or glow baked in here to avoid a doubled/mismatched edge.
  -->
  <rect x="0.5" y="0.5" width="119" height="39" rx="0" fill="#16232a"/>
</svg>
