<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" width="240" height="48">

  <!-- Waveform group (left icon block) -->
  <g opacity="0.9">
    <!-- Bar 1 -->
    <rect x="2"  y="20" width="3.5" height="10" rx="1.75" fill="currentColor"/>
    <!-- Bar 2 -->
    <rect x="7.5"  y="13" width="3.5" height="24" rx="1.75" fill="currentColor"/>
    <!-- Bar 3 -->
    <rect x="13" y="8"  width="3.5" height="34" rx="1.75" fill="currentColor"/>
    <!-- Bar 4 (tallest, near cut) -->
    <rect x="18.5" y="3"  width="3.5" height="42" rx="1.75" fill="currentColor"/>

    <!-- Vertical cut line -->
    <line x1="26" y1="1" x2="26" y2="47"
          stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" opacity="0.5"
          stroke-dasharray="2,3"/>

    <!-- Bar 5 (after cut, slightly offset to show split) -->
    <rect x="28.5" y="3"  width="3.5" height="42" rx="1.75" fill="currentColor" opacity="0.7"/>
    <!-- Bar 6 -->
    <rect x="34" y="9"  width="3.5" height="30" rx="1.75" fill="currentColor" opacity="0.7"/>
    <!-- Bar 7 -->
    <rect x="39.5" y="15" width="3.5" height="18" rx="1.75" fill="currentColor" opacity="0.7"/>
    <!-- Bar 8 -->
    <rect x="45" y="21" width="3.5" height="9" rx="1.75" fill="currentColor" opacity="0.7"/>
  </g>

  <!-- Separator dot -->
  <circle cx="57" cy="24" r="2" fill="currentColor" opacity="0.4"/>

  <!-- Wordmark: DYSEKT -->
  <text x="65" y="38"
        font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif"
        font-weight="700"
        font-size="36"
        letter-spacing="5"
        fill="currentColor">DYSEKT-SF</text>

</svg>
