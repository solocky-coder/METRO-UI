<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Bright cyan pointer aligned to 0° (top/12 o'clock) -->
  <!-- This will be rotated at runtime using AffineTransform -->
  <defs>
    <linearGradient id="pointerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffe0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d0d0;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  <!-- Pointer line: narrow rect from center upward to indicate current value -->
  <rect x="61" y="16" width="6" height="32" fill="url(#pointerGrad)" rx="1"/>
  <!-- Subtle glow effect -->
  <rect x="61" y="16" width="6" height="32" fill="none" stroke="#00ffe0" stroke-width="1" opacity="0.5" rx="1"/>
</svg>
